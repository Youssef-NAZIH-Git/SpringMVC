<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
>
<head>
    <meta charset="UTF-8">
    <title>Products Page</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
</head>
<body>
<div layout:fragment="content1">
    <table class="table table-striped table-hover">
        <thead>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Delete</th>
        </thead>
        <tbody>
        <tr th:each="p:${productList}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td>
                <a class="btn btn-danger" th:href="@{/delete(id=${p.id})}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
    <form method="POST" th:action="@{/add}">
        <table class="table">
            <thead>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Add</th>
            </thead>
            <tbody>
            <tr>
                <td>
                    <input th:value="${productToBeAdded.name}" name="name" type="text" class="form-control" placeholder="Name">
                    <span class="text-danger" th:errors="${productToBeAdded.name}"></span>
                </td>
                <td>
                    <input th:value="${productToBeAdded.price}" name="price" type="text" class="form-control" placeholder="Price">
                    <span class="text-danger" th:errors="${productToBeAdded.price}"></span>
                </td>
                <td>
                    <input th:value="${productToBeAdded.quantity}" name="quantity" type="text" class="form-control" placeholder="Quantity">
                    <span class="text-danger" th:errors="${productToBeAdded.quantity}"></span>
                </td>
                <td><button class="btn btn-primary" type="submit">Add product</button></td>
            </tr>
            </tbody>
        </table>
    </form>
</div>
</body>
</html>
